<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha | OrbitalPay</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <main class="main-container">
        <section class="branding-side">
            <div class="image-wrapper">
                <img src="arte cartoes.png" alt="Arte cartões OrbitalPay">
            </div>
        </section>

        <section class="login-side">
            <div class="login-card">
                <h2>Recuperar acesso</h2>
                
                <div class="input-info">
                    <span>Esqueceu sua senha?</span>
                    <p>Informe seus dados cadastrados para receber as instruções de recuperação.</p>
                </div>

                <form id="recoverForm">
                    <div class="input-group">
                        <label for="cpf">CPF</label>
                        <input type="text" id="cpf" placeholder="000.000.000-00" required>
                    </div>

                    <div class="input-group">
                        <label for="email">E-mail cadastrado</label>
                        <input type="email" id="email" placeholder="seuemail@exemplo.com" required>
                    </div>

                    <button type="submit" class="btn-primary">Enviar instruções</button>
                </form>

                <div class="divider">
                    <span>Lembrou a senha?</span>
                </div>

                <ul class="other-options">
                    <li>
                        <a href="index.html" class="btn-outline">Voltar para o Login</a>
                    </li>
                </ul>

                <footer class="login-footer">
                    <p>Precisa de ajuda imediata? <a href="#">Fale com o suporte</a></p>
                </footer>
            </div>
        </section>
    </main>
    <script src="javascript.js"></script>
</body>
</html>
